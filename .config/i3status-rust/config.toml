icons_format = "{icon}"

[theme]
theme = "gruvbox-dark"

[icons]
icons = "awesome4"

# ---------------- CPU ----------------
[[block]]
block = "cpu"
info_cpu = 20
warning_cpu = 50
critical_cpu = 90

[block.theme_overrides]
idle_bg = "#076678" # Dark Aqua/Blue
idle_fg = "#FFFFFF"

# ---------------- RAM ----------------
[[block]]
block = "memory"
format = " $icon $mem_used.eng(w:2) "

[block.theme_overrides]
idle_bg = "#79740E" # Dark Green
idle_fg = "#FFFFFF"

# ---------------- Disk ----------------
[[block]]
block = "disk_space"
path = "/"
info_type = "available"
alert_unit = "GB"
interval = 20
warning = 20.0
alert = 10.0
format = " $icon  $available.eng(w:2) "

[block.theme_overrides]
idle_bg = "#AF3A03" # Dark Orange
idle_fg = "#FFFFFF"

# ---------------- Network ----------------
[[block]]
block = "net"
device = "wlan0"
format = " $icon  $ip $ssid "

[block.theme_overrides]
idle_bg = "#9D0006" # Dark Red
idle_fg = "#FFFFFF"

[[block.click]]
button = "left"
cmd = "nm-connection-editor"

# ---------------- Sound ----------------
[[block]]
block = "sound"
format = " $icon  {$volume.eng(w:2) |}"
max_vol = 100

[block.theme_overrides]
idle_bg = "#8F3F71"
idle_fg = "#FFFFFF"

[[block.click]]
button = "left"
cmd = "pavucontrol"

# ---------------- Time ----------------
[[block]]
block = "time"
interval = 5
format = " $timestamp.datetime(f:'%a %d/%m %R') "

[block.theme_overrides]
idle_bg = "#427B58" # Dark Aqua
idle_fg = "#FFFFFF"
